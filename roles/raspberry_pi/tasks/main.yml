---
# ansible-task
- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    upgrade: safe
    update_cache: true
    cache_valid_time: 86400

- name: Install baseline system and security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - apt-listchanges
      - unzip
      - wget
      - curl
    state: present

- name: Set up authorized keys for the remote user
  ansible.posix.authorized_key:
    user: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    state: present
    key: "{{ item }}"
  loop: "{{ raspberry_pi_authorized_keys }}"

- name: Configure SSH Port
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?Port "
    line: "Port {{ raspberry_pi_ssh_port }}"
    state: present
  notify: Restart SSH service

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin "
    line: "PermitRootLogin {{ raspberry_pi_permit_root_login }}"
    state: present
  notify: Restart SSH service

- name: Disable password authentication via SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication "
    line: "PasswordAuthentication {{ raspberry_pi_password_authentication }}"
    state: present
  notify: Restart SSH service

- name: Disable empty passwords via SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitEmptyPasswords "
    line: "PermitEmptyPasswords no"
    state: present
  notify: Restart SSH service

- name: Configure UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ raspberry_pi_ssh_port | string }}"
    proto: tcp

- name: Allow additional user-specified ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item | string }}"
    proto: tcp
  loop: "{{ raspberry_pi_allowed_ports }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  when: raspberry_pi_ufw_enabled

- name: Ensure fail2ban is running and enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Configure automatic upgrades for apt
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  when: raspberry_pi_unattended_upgrades_enabled

- name: Ensure unattended-upgrades service is running and enabled
  ansible.builtin.service:
    name: unattended-upgrades
    state: started
    enabled: true
  when: raspberry_pi_unattended_upgrades_enabled
