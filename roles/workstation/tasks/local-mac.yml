---
# ansible-task
- name: Ensure ~/code directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/code"
    state: directory
    mode: "0755"

- name: Configure GPG SSH program
  community.general.git_config:
    name: gpg.ssh.program
    value: /Applications/1Password.app/Contents/MacOS/op-ssh-sign
    scope: global

- name: Create SSH config file with 1Password agent
  ansible.builtin.copy:
    content: |
      Host *
        IdentityAgent "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"
    dest: "{{ ansible_facts['env']['HOME'] }}/.ssh/config"
    mode: "0600"

- name: Install Homebrew with error handling
  block:
    - name: Install Homebrew if not present
      ansible.builtin.shell: |
        /bin/bash -c "$(curl -fsSL -m 300 https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      args:
        creates: /opt/homebrew/bin/brew
      become: false
      changed_when: false
      register: workstation_homebrew_install_result
      retries: 3
      delay: 5
      until: workstation_homebrew_install_result.rc == 0

    - name: Verify Homebrew installation
      ansible.builtin.command: /opt/homebrew/bin/brew --version
      register: workstation_brew_version_check
      changed_when: false
      failed_when: workstation_brew_version_check.rc != 0
      retries: 3
      delay: 5
      until: workstation_brew_version_check.rc == 0
  rescue:
    - name: Fail if Homebrew installation failed
      ansible.builtin.fail:
        msg: "Homebrew installation failed. Please check the logs for more details."

- name: Debug Homebrew installation result
  ansible.builtin.debug:
    var: workstation_homebrew_install_result
    verbosity: 2


- name: Check last Homebrew update time
  ansible.builtin.stat:
    path: /opt/homebrew/.git/FETCH_HEAD
  register: workstation_brew_update_stat

- name: Set update_brew variable if last update was more than 24 hours ago
  ansible.builtin.set_fact:
    workstation_update_brew: >-
      {{ (workstation_brew_update_stat.stat.exists and ((ansible_facts['date_time']['epoch'] | int) - (workstation_brew_update_stat.stat.mtime | int) > 86400))
         or (not workstation_brew_update_stat.stat.exists) }}

- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop:
    - anomalyco/tap
    - steipete/tap
  register: workstation_homebrew_tap_result
  retries: 3
  delay: 5
  until: workstation_homebrew_tap_result is succeeded

- name: Update Homebrew and install packages
  community.general.homebrew:
    name:
      - gh
      - htop
      - macmon
      - oh-my-posh
      - uv
      - pre-commit
      - pulumi
      - opencode
      - imsg
      - zsh-autocomplete
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - zsh-history-substring-search
    state: present
    update_homebrew: "{{ workstation_update_brew }}"
  retries: 3
  delay: 5
  timeout: 300

- name: Verify Homebrew packages installation
  ansible.builtin.command: gh --version
  register: workstation_gh_version_check
  changed_when: false
  failed_when: workstation_gh_version_check.rc != 0
  retries: 3
  delay: 5
  until: workstation_gh_version_check.rc == 0

- name: Debug Homebrew packages installation check
  ansible.builtin.debug:
    var: workstation_gh_version_check
    verbosity: 2

- name: Install Homebrew casks with security verification
  block:
    - name: Install 1Password and 1Password CLI with security verification
      community.general.homebrew_cask:
        name:
          - 1password
          - 1password-cli
        state: present
      retries: 3
      delay: 5

    - name: Verify 1Password CLI installation and security
      ansible.builtin.command: |
        /opt/homebrew/bin/op --version
      register: workstation_op_version_check
      changed_when: false
      failed_when: workstation_op_version_check.rc != 0
      retries: 3
      delay: 5
      until: workstation_op_version_check.rc == 0

    - name: Debug 1Password CLI version check
      ansible.builtin.debug:
        var: workstation_op_version_check
        verbosity: 2

    - name: Validate 1Password CLI version meets security requirements
      ansible.builtin.fail:
        msg: "1Password CLI version {{ workstation_op_version_check.stdout }} does not meet minimum security requirements (2.0.0+)"
      when:
        - workstation_op_version_check.stdout is defined
        - (workstation_op_version_check.stdout | regex_search('([0-9]+)\\.([0-9]+)\\.([0-9]+)') | split('.') | first | int) < 2

    - name: Install other Homebrew casks
      community.general.homebrew_cask:
        name:
          - iterm2
          - visual-studio-code
          - orbstack
          - rectangle
        state: present
      retries: 3
      delay: 5

    - name: Check if Nerd Font is already installed natively
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/Library/Fonts/MesloLGLDZNerdFont-Bold.ttf"
      register: _workstation_nerd_font_check

    - name: Install Nerd Fonts
      community.general.homebrew_cask:
        name: font-meslo-lg-nerd-font
        state: present
      when: not _workstation_nerd_font_check.stat.exists


- name: Check if Oh My Zsh is installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
  register: workstation_oh_my_zsh_stat


- name: Install Oh My Zsh with error handling
  block:
    - name: Install Oh My Zsh if not present
      ansible.builtin.shell: |
        sh -c "$(curl -fsSL -m 300 https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      args:
        creates: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
      when: not workstation_oh_my_zsh_stat.stat.exists
      changed_when: false
      register: workstation_oh_my_zsh_install_result
      retries: 3
      delay: 5
      until: workstation_oh_my_zsh_install_result.rc == 0

    - name: Verify Oh My Zsh installation
      ansible.builtin.stat:
        path: "{{ ansible_facts['env']['HOME'] }}/.oh-my-zsh"
      register: workstation_oh_my_zsh_stat_check

    - name: Fail if Oh My Zsh is not installed
      ansible.builtin.fail:
        msg: "Oh My Zsh installation failed. The directory ~/.oh-my-zsh was not found."
      when: not workstation_oh_my_zsh_stat_check.stat.exists
  rescue:
    - name: Fail if Oh My Zsh installation failed
      ansible.builtin.fail:
        msg: "Oh My Zsh installation failed. Please check the logs for more details."

- name: Debug Oh My Zsh installation result
  ansible.builtin.debug:
    var: workstation_oh_my_zsh_install_result
    verbosity: 2

- name: Check if Hermes Agent is installed
  ansible.builtin.command: which hermes
  register: workstation_hermes_check
  changed_when: false
  failed_when: false

- name: Create secure temp directory for Hermes install script
  ansible.builtin.tempfile:
    state: directory
    suffix: hermes_install
  register: workstation_hermes_tmpdir
  when: workstation_hermes_check.rc != 0

- name: Download Hermes Agent install script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/NousResearch/hermes-agent/v2026.4.23/scripts/install.sh
    dest: "{{ workstation_hermes_tmpdir.path }}/install.sh"
    mode: "0700"
    timeout: 300
  when: workstation_hermes_check.rc != 0
  register: workstation_hermes_download_result
  retries: 3
  delay: 5
  until: workstation_hermes_download_result is succeeded

- name: Install Hermes Agent
  ansible.builtin.command:
    argv:
      - "{{ workstation_hermes_tmpdir.path }}/install.sh"
      - --skip-setup
  become: false
  when: workstation_hermes_check.rc != 0
  register: workstation_hermes_install_result
  changed_when: false

- name: Remove Hermes Agent install script temp directory
  ansible.builtin.file:
    path: "{{ workstation_hermes_tmpdir.path }}"
    state: absent
  when: workstation_hermes_check.rc != 0

- name: Debug Hermes Agent installation result
  ansible.builtin.debug:
    var: workstation_hermes_install_result
    verbosity: 2

- name: Verify Hermes Agent installation
  ansible.builtin.command: hermes --version
  register: workstation_hermes_version_check
  changed_when: false
  failed_when: workstation_hermes_version_check.rc != 0
  when: workstation_hermes_check.rc != 0

- name: Copy zshrc file
  ansible.builtin.copy:
    src: zshrc-mac
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    mode: "0644"
    backup: true
  changed_when: false

- name: Copy zshenv file
  ansible.builtin.copy:
    src: zshenv-mac
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshenv"
    mode: "0644"
    backup: true
  changed_when: false

- name: Copy zprofile file
  ansible.builtin.copy:
    src: zprofile-mac
    dest: "{{ ansible_facts['env']['HOME'] }}/.zprofile"
    mode: "0644"
    backup: true
  changed_when: false

# 1Password CLI Security Enhancements
- name: Include 1Password security enhancements
  ansible.builtin.include_tasks: 1password-security.yml

- name: Run 1Password CLI health check
  ansible.builtin.command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/op-health-check"
  register: workstation_op_health_check
  changed_when: false
  failed_when: workstation_op_health_check.rc > 1  # Allow warnings (rc=1) but fail on errors (rc=2)

- name: Debug 1Password CLI health check
  ansible.builtin.debug:
    var: workstation_op_health_check
    verbosity: 2
