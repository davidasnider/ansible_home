---
# tasks file for home_assistant_remote

- name: Install Bluetooth stack and utilities
  ansible.builtin.apt:
    name:
      - bluez
      - bluez-tools
      - dbus
    state: present
    update_cache: true

- name: Ensure Bluetooth service is running and enabled
  ansible.builtin.systemd:
    name: bluetooth
    state: started
    enabled: true

- name: Unblock Bluetooth hardware
  ansible.builtin.command: rfkill unblock bluetooth
  changed_when: false

- name: Create Home Assistant configuration directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ home_assistant_remote_user }}"
    group: "{{ home_assistant_remote_user }}"
    mode: "0755"
  loop:
    - "{{ home_assistant_remote_config_dir }}"
    - "{{ home_assistant_remote_config_dir }}/custom_components"

- name: Check if Home Assistant configuration.yaml exists
  ansible.builtin.stat:
    path: "{{ home_assistant_remote_config_dir }}/configuration.yaml"
  register: home_assistant_remote_config_file

- name: Seed baseline configuration.yaml
  ansible.builtin.copy:
    content: |
      default_config:

      remote_homeassistant:
        instances:
    dest: "{{ home_assistant_remote_config_dir }}/configuration.yaml"
    owner: "{{ home_assistant_remote_user }}"
    group: "{{ home_assistant_remote_user }}"
    mode: "0644"
  when: not home_assistant_remote_config_file.stat.exists

- name: Check if remote_homeassistant custom component is installed
  ansible.builtin.stat:
    path: "{{ home_assistant_remote_config_dir }}/custom_components/remote_homeassistant"
  register: home_assistant_remote_dir

- name: Create temporary directory for integration download
  ansible.builtin.tempfile:
    state: directory
    suffix: remote_ha
  register: home_assistant_remote_temp_dir
  when: not home_assistant_remote_dir.stat.exists

- name: Download and unpack remote_homeassistant integration archive
  ansible.builtin.unarchive:
    src: "{{ home_assistant_remote_zip_url }}"
    dest: "{{ home_assistant_remote_temp_dir.path }}"
    remote_src: true
  when: not home_assistant_remote_dir.stat.exists

- name: Install remote_homeassistant custom component
  ansible.builtin.copy:
    src: "{{ home_assistant_remote_temp_dir.path }}/remote_homeassistant-{{ home_assistant_remote_version }}/custom_components/remote_homeassistant"
    dest: "{{ home_assistant_remote_config_dir }}/custom_components/"
    remote_src: true
    owner: "{{ home_assistant_remote_user }}"
    group: "{{ home_assistant_remote_user }}"
    mode: "0755"
  when: not home_assistant_remote_dir.stat.exists

- name: Clean up temporary integration download directory
  ansible.builtin.file:
    path: "{{ home_assistant_remote_temp_dir.path }}"
    state: absent
  when: not home_assistant_remote_dir.stat.exists

- name: Ensure correct permissions on Home Assistant configuration directory
  ansible.builtin.file:
    path: "{{ home_assistant_remote_config_dir }}"
    owner: "{{ home_assistant_remote_user }}"
    group: "{{ home_assistant_remote_user }}"
    recurse: true
  when: not home_assistant_remote_dir.stat.exists

# Deploy Home Assistant Docker container.
# NOTE on security and network isolation trade-offs:
# - network_mode: host is required for UPnP, mDNS, SSDP, and DHCP discovery to find smart home devices on the local subnet.
# - capabilities (NET_ADMIN, NET_RAW) are required to allow Home Assistant to perform low-level network operations (e.g. bluetooth/network monitoring).
# - /run/dbus mapping is required to allow Home Assistant to communicate with the host's BlueZ bluetooth stack.
# Alternatives like macvlan would improve network isolation, but complicate mDNS repeater configuration and host-to-container communication.
- name: Deploy Home Assistant Docker container
  community.docker.docker_container:
    name: homeassistant
    image: homeassistant/home-assistant:stable
    state: started
    restart_policy: unless-stopped
    network_mode: host
    capabilities:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - "{{ home_assistant_remote_config_dir }}:/config"
      - "/run/dbus:/run/dbus:ro"
