name: CI & Quality Checks
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

jobs:
  ansible-lint:
    name: Ansible Linting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ansible ansible-lint

    - name: Run ansible-lint
      run: ansible-lint roles/

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install pre-commit
      run: |
        python -m pip install --upgrade pip
        pip install pre-commit

    - name: Run pre-commit
      run: pre-commit run --all-files

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install detect-secrets
      run: |
        python -m pip install --upgrade pip
        pip install detect-secrets

    - name: Run detect-secrets scan
      run: |
        detect-secrets scan --exclude-files '\.venv/.*|\.git/.*|__pycache__/.*|\.pyc$' --force-use-all-plugins --baseline .secrets.baseline

    - name: Verify baseline is up to date
      run: |
        if ! detect-secrets audit --report .secrets.baseline > /dev/null 2>&1; then
          echo "❌ Baseline file contains unaudited secrets"
          echo "Please run 'detect-secrets audit .secrets.baseline' locally and commit the results"
          exit 1
        fi

  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Python 3.12
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: '3.12'

    - name: Install Ansible
      run: |
        python -m pip install --upgrade pip
        pip install ansible

    - name: Check playbook syntax
      run: |
        ansible-playbook --syntax-check -i inventory/hosts.yml playbooks/workstations.yml
        ansible-playbook --syntax-check -i inventory/hosts.yml playbooks/raspberry_pis.yml


  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout Repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Dependency Review
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  pr-gatekeeper:
    name: PR Gatekeeper
    runs-on: ubuntu-latest
    permissions: {}
    if: github.event_name == 'pull_request'
    steps:
      - name: Check for 'ready-to-merge' label
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'ready-to-merge') }}" == "true" ]]; then
            echo "✅ 'ready-to-merge' label found. Proceeding..."
            exit 0
          else
            echo "❌ Missing 'ready-to-merge' label. Warning only."
            echo "Please review the changes and add the label once ready."
            exit 0
          fi

  auto-approve:
    name: Auto Approve PR
    runs-on: ubuntu-latest
    needs: [ansible-lint, pre-commit, secret-scanning, syntax-check, dependency-review, pr-gatekeeper]
    permissions:
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request' && (github.actor == 'davidasnider' || github.actor == 'dependabot[bot]') && contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    steps:
    - name: Auto approve PR
      run: gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved after all checks passed and 'ready-to-merge' label was added." --repo ${{ github.repository }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: auto-approve
    permissions:
      contents: write
      pull-requests: write
    if: github.event_name == 'pull_request' && (github.actor == 'davidasnider' || github.actor == 'dependabot[bot]') && contains(github.event.pull_request.labels.*.name, 'ready-to-merge')
    steps:
    - name: Enable auto-merge for PR
      run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
